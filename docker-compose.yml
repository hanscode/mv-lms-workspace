name: mvlms

services:
  mysql:
    image: mysql:8.0.45
    container_name: mvlms-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lms_rebuild
      MYSQL_USER: lms_rebuild
      MYSQL_PASSWORD: password
    volumes:
      - mvlms-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mvlms-mysql-data:
